      <rect width="130" height="2.5" y="0" rx="1" fill="#c084fc" fill-opacity="0.7"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="14" font-weight="900" fill="#c084fc" filter="url(#glow)">Py</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">Python</text>
      <text x="108" y="42" font-family="monospace" font-size="22" fill="#c084fc" fill-opacity="0.07">{}</text>
    </g>
    <!-- C++ -->
    <g transform="translate(610,92)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#8a61ff" stroke-width="0.6" stroke-opacity="0.35"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#8a61ff" fill-opacity="0.7"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="14" font-weight="900" fill="#8a61ff" filter="url(#glow)">C++</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">C Plus Plus</text>
      <text x="108" y="42" font-family="monospace" font-size="22" fill="#8a61ff" fill-opacity="0.07">{}</text>

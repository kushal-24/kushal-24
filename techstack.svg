<svg width="900" height="500" viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07060f"/>
      <stop offset="100%" style="stop-color:#0d0b1a"/>
    </linearGradient>
    <radialGradient id="glowTop" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#5b35cc;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowBot" cx="50%" cy="100%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16122a"/>
      <stop offset="100%" style="stop-color:#0f0d1e"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8a61ff" stroke-width="0.3" stroke-opacity="0.06"/>
    </pattern>
    <clipPath id="clip"><rect width="900" height="500" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- BG layers -->
    <rect width="900" height="500" fill="url(#bg)"/>
    <rect width="900" height="500" fill="url(#glowTop)"/>
    <rect width="900" height="500" fill="url(#glowBot)"/>
    <rect width="900" height="500" fill="url(#grid)"/>
    <!-- Side accent lines -->
    <line x1="0" y1="0" x2="0" y2="500" stroke="#8a61ff" stroke-width="2" stroke-opacity="0.25"/>
    <line x1="900" y1="0" x2="900" y2="500" stroke="#8a61ff" stroke-width="2" stroke-opacity="0.25"/>
    <!-- Corner brackets -->
    <polyline points="20,44 20,20 44,20" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <polyline points="856,20 880,20 880,44" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <polyline points="20,456 20,480 44,480" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <polyline points="856,480 880,480 880,456" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.5"/>

    <!-- ══ TITLE ══ -->
    <text x="450" y="50" text-anchor="middle"
      font-family="'Arial Black', Impact, sans-serif"
      font-size="20" font-weight="900" letter-spacing="10"
      fill="#d4c8ff" filter="url(#tglow)">⚡  TECH  STACK</text>
    <line x1="320" y1="60" x2="580" y2="60" stroke="#8a61ff" stroke-width="0.8" stroke-opacity="0.4"/>

    <!-- ══ LANGUAGES ══ -->
    <text x="450" y="84" text-anchor="middle" font-family="Arial,sans-serif"
      font-size="9.5" fill="#7068a0" letter-spacing="4">LANGUAGES</text>

    <!-- JS -->
    <g transform="translate(121,92)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#f1e05a" stroke-width="0.6" stroke-opacity="0.25"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#f1e05a" fill-opacity="0.65"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="14" font-weight="900" fill="#f1e05a" filter="url(#glow)">JS</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">JavaScript</text>
      <text x="108" y="42" font-family="monospace" font-size="22" fill="#f1e05a" fill-opacity="0.07">{}</text>
    </g>
    <!-- TS -->
    <g transform="translate(265,92)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#3178c6" stroke-width="0.6" stroke-opacity="0.3"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#3178c6" fill-opacity="0.75"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="14" font-weight="900" fill="#3178c6" filter="url(#glow)">TS</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">TypeScript</text>
      <text x="108" y="42" font-family="monospace" font-size="22" fill="#3178c6" fill-opacity="0.07">{}</text>
    </g>
    <!-- Python -->
    <g transform="translate(409,92)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#c084fc" stroke-width="0.6" stroke-opacity="0.3"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#c084fc" fill-opacity="0.7"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="14" font-weight="900" fill="#c084fc" filter="url(#glow)">Py</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">Python</text>
      <text x="108" y="42" font-family="monospace" font-size="22" fill="#c084fc" fill-opacity="0.07">{}</text>
    </g>
    <!-- C++ -->
    <g transform="translate(553,92)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#8a61ff" stroke-width="0.6" stroke-opacity="0.35"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#8a61ff" fill-opacity="0.7"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="14" font-weight="900" fill="#8a61ff" filter="url(#glow)">C++</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">C Plus Plus</text>
      <text x="108" y="42" font-family="monospace" font-size="22" fill="#8a61ff" fill-opacity="0.07">{}</text>
    </g>

    <!-- divider -->
    <line x1="60" y1="158" x2="840" y2="158" stroke="#8a61ff" stroke-width="0.5" stroke-opacity="0.1"/>

    <!-- ══ FRONTEND ══ -->
    <text x="450" y="178" text-anchor="middle" font-family="Arial,sans-serif"
      font-size="9.5" fill="#7068a0" letter-spacing="4">FRONTEND</text>

    <!-- React -->
    <g transform="translate(121,186)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#61dafb" stroke-width="0.6" stroke-opacity="0.2"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#61dafb" fill-opacity="0.6"/>
      <text x="16" y="26" font-family="sans-serif" font-size="16" fill="#61dafb" filter="url(#glow)">⚛</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">React</text>
      <circle cx="112" cy="27" r="16" fill="none" stroke="#61dafb" stroke-width="0.5" stroke-opacity="0.12"/>
    </g>
    <!-- Next.js -->
    <g transform="translate(265,186)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#ffffff" stroke-width="0.6" stroke-opacity="0.12"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#ffffff" fill-opacity="0.4"/>
      <text x="16" y="27" font-family="'Arial Black',sans-serif" font-size="14" fill="#ffffff" filter="url(#glow)">▲</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">Next.js</text>
      <circle cx="112" cy="27" r="16" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.08"/>
    </g>
    <!-- Tailwind -->
    <g transform="translate(409,186)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#38bdf8" stroke-width="0.6" stroke-opacity="0.2"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#38bdf8" fill-opacity="0.6"/>
      <text x="16" y="27" font-family="'Arial Black',sans-serif" font-size="18" fill="#38bdf8" filter="url(#glow)">~</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">Tailwind CSS</text>
      <circle cx="112" cy="27" r="16" fill="none" stroke="#38bdf8" stroke-width="0.5" stroke-opacity="0.1"/>
    </g>
    <!-- Figma -->
    <g transform="translate(553,186)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#c084fc" stroke-width="0.6" stroke-opacity="0.25"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#c084fc" fill-opacity="0.6"/>
      <text x="16" y="27" font-family="sans-serif" font-size="15" fill="#c084fc" filter="url(#glow)">◈</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">Figma</text>
      <circle cx="112" cy="27" r="16" fill="none" stroke="#c084fc" stroke-width="0.5" stroke-opacity="0.1"/>
    </g>

    <!-- divider -->
    <line x1="60" y1="252" x2="840" y2="252" stroke="#8a61ff" stroke-width="0.5" stroke-opacity="0.1"/>

    <!-- ══ BACKEND & TOOLS ══ -->
    <text x="450" y="272" text-anchor="middle" font-family="Arial,sans-serif"
      font-size="9.5" fill="#7068a0" letter-spacing="4">BACKEND  &amp;  TOOLS</text>

    <!-- Node.js -->
    <g transform="translate(55,280)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#6dbf67" stroke-width="0.6" stroke-opacity="0.25"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#6dbf67" fill-opacity="0.6"/>
      <text x="16" y="26" font-family="sans-serif" font-size="15" fill="#6dbf67" filter="url(#glow)">⬡</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">Node.js</text>
    </g>
    <!-- Docker -->
    <g transform="translate(199,280)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#2496ed" stroke-width="0.6" stroke-opacity="0.25"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#2496ed" fill-opacity="0.6"/>
      <text x="16" y="27" font-family="sans-serif" font-size="16" fill="#2496ed">🐳</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">Docker</text>
    </g>
    <!-- PostgreSQL -->
    <g transform="translate(343,280)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#5b9bd5" stroke-width="0.6" stroke-opacity="0.25"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#5b9bd5" fill-opacity="0.55"/>
      <text x="16" y="27" font-family="sans-serif" font-size="16" fill="#5b9bd5">🐘</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">PostgreSQL</text>
    </g>
    <!-- Git -->
    <g transform="translate(487,280)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#f05032" stroke-width="0.6" stroke-opacity="0.25"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#f05032" fill-opacity="0.6"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="14" fill="#f05032" filter="url(#glow)">⎇</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">Git</text>
    </g>
    <!-- VS Code -->
    <g transform="translate(631,280)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#007acc" stroke-width="0.6" stroke-opacity="0.3"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#007acc" fill-opacity="0.65"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="14" fill="#007acc" filter="url(#glow)">⌨</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">VS Code</text>
    </g>

    <!-- divider -->
    <line x1="60" y1="346" x2="840" y2="346" stroke="#8a61ff" stroke-width="0.5" stroke-opacity="0.1"/>

    <!-- ══ VIDEO & CREATIVE ══ -->
    <text x="450" y="366" text-anchor="middle" font-family="Arial,sans-serif"
      font-size="9.5" fill="#7068a0" letter-spacing="4">VIDEO  &amp;  CREATIVE</text>

    <!-- Premiere Pro — centered pair -->
    <g transform="translate(253,374)">
      <rect width="172" height="54" rx="8" fill="url(#card)" stroke="#9999ff" stroke-width="0.6" stroke-opacity="0.25"/>
      <rect width="172" height="2.5" y="0" rx="1" fill="#9999ff" fill-opacity="0.55"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="12" fill="#9999ff" filter="url(#glow)">Pr</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">Adobe Premiere Pro</text>
    </g>
    <!-- After Effects -->
    <g transform="translate(441,374)">
      <rect width="172" height="54" rx="8" fill="url(#card)" stroke="#c084fc" stroke-width="0.6" stroke-opacity="0.25"/>
      <rect width="172" height="2.5" y="0" rx="1" fill="#c084fc" fill-opacity="0.55"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="12" fill="#c084fc" filter="url(#glow)">Ae</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">Adobe After Effects</text>
    </g>

  </g>
</svg>
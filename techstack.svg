<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07060f"/>
      <stop offset="100%" style="stop-color:#0d0b1a"/>
    </linearGradient>
    <radialGradient id="glowTop" cx="50%" cy="0%" r="60%">
      <stop offset="0%" style="stop-color:#5b35cc;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glowBot" cx="50%" cy="100%" r="50%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16122a"/>
      <stop offset="100%" style="stop-color:#0f0d1e"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#8a61ff" stroke-width="0.3" stroke-opacity="0.06"/>
    </pattern>
    <clipPath id="clip"><rect width="900" height="600" rx="14"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- BG layers -->
    <rect width="900" height="600" fill="url(#bg)"/>
    <rect width="900" height="600" fill="url(#glowTop)"/>
    <rect width="900" height="600" fill="url(#glowBot)"/>
    <rect width="900" height="600" fill="url(#grid)"/>
    <!-- Side accent lines -->
    <line x1="0" y1="0" x2="0" y2="600" stroke="#8a61ff" stroke-width="2" stroke-opacity="0.25"/>
    <line x1="900" y1="0" x2="900" y2="600" stroke="#8a61ff" stroke-width="2" stroke-opacity="0.25"/>
    <!-- Corner brackets -->
    <polyline points="20,44 20,20 44,20" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <polyline points="856,20 880,20 880,44" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <polyline points="20,556 20,580 44,580" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.5"/>
    <polyline points="856,580 880,580 880,556" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.5"/>

    <!-- ══ TITLE ══ -->
    <text x="450" y="50" text-anchor="middle"
      font-family="'Arial Black', Impact, sans-serif"
      font-size="20" font-weight="900" letter-spacing="10"
      fill="#d4c8ff" filter="url(#tglow)">⚡  TECH  STACK</text>
    <line x1="320" y1="60" x2="580" y2="60" stroke="#8a61ff" stroke-width="0.8" stroke-opacity="0.4"/>

    <!-- ══ 1. LANGUAGES (Y=84, Cards Y=92) ══ -->
    <text x="450" y="84" text-anchor="middle" font-family="Arial,sans-serif"
      font-size="9.5" fill="#7068a0" letter-spacing="4">LANGUAGES</text>

    <!-- JS -->
    <g transform="translate(160,92)">
      <rect width="130" height="54" rx="8" fill="url(#card)" stroke="#f1e05a" stroke-width="0.6" stroke-opacity="0.25"/>
      <rect width="130" height="2.5" y="0" rx="1" fill="#f1e05a" fill-opacity="0.65"/>
      <text x="16" y="26" font-family="'Arial Black',sans-serif" font-size="14" font-weight="900" fill="#f1e05a" filter="url(#glow)">JS</text>
      <text x="16" y="42" font-family="Arial,sans-serif" font-size="9" fill="#d4c8ff" letter-spacing="2" fill-opacity="0.8">JavaScript</text>
      <text x="108" y="42" font-family="monospace" font-size="22" fill="#f1e05a" fill-opacity="0.07">{}</text>
    </g>

<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07060f"/>
      <stop offset="100%" style="stop-color:#0d0b1a"/>
    </linearGradient>
    <radialGradient id="blob1" cx="80%" cy="20%" r="55%">
      <stop offset="0%" style="stop-color:#5b35cc;stop-opacity:0.55"/>
      <stop offset="55%" style="stop-color:#2d1a66;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="15%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="55%" cy="90%" r="30%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="45%" style="stop-color:#d4c8ff"/>
      <stop offset="100%" style="stop-color:#8a61ff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#07060f;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#8a61ff"/>
      <stop offset="70%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </linearGradient>
    <filter id="nameGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="7" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#8a61ff" stroke-width="0.4" stroke-opacity="0.07"/>
    </pattern>
    <clipPath id="bannerClip">
      <rect width="900" height="280" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <rect width="900" height="280" fill="url(#bgGrad)"/>
    <rect width="900" height="280" fill="url(#blob1)"/>
    <rect width="900" height="280" fill="url(#blob2)"/>
    <rect width="900" height="280" fill="url(#blob3)"/>
    <rect width="900" height="280" fill="url(#grid)"/>

    <!-- Extra glows -->
    <ellipse cx="790" cy="55" rx="200" ry="130" fill="#5b35cc" fill-opacity="0.12"/>
    <ellipse cx="100" cy="240" rx="160" ry="100" fill="#6366f1" fill-opacity="0.08"/>

    <!-- Corner brackets -->
    <polyline points="20,42 20,20 42,20" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.55"/>
    <polyline points="858,20 880,20 880,42" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.55"/>
    <polyline points="20,238 20,260 42,260" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.55"/>
    <polyline points="858,260 880,260 880,238" fill="none" stroke="#8a61ff" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- Ghost name -->
    <text x="453" y="165" text-anchor="middle"
      font-family="'Arial Black', Impact, sans-serif"
      font-size="114" font-weight="900" letter-spacing="18"
      fill="none" stroke="#8a61ff" stroke-width="1" stroke-opacity="0.07">KUSHAL</text>

    <!-- Main name -->
    <text x="450" y="160" text-anchor="middle"
      font-family="'Arial Black', Impact, sans-serif"
      font-size="114" font-weight="900" letter-spacing="18"
      fill="url(#nameGrad)" filter="url(#nameGlow)">KUSHAL</text>

    <!-- Deco line -->
    <line x1="210" y1="181" x2="690" y2="181" stroke="url(#lineGrad)" stroke-width="1" stroke-opacity="0.85"/>

    <!-- Ambient dots -->
    <circle cx="60" cy="55" r="1.5" fill="#8a61ff" fill-opacity="0.5"/>
    <circle cx="840" cy="195" r="1.5" fill="#c084fc" fill-opacity="0.5"/>
    <circle cx="130" cy="235" r="1.2" fill="#6366f1" fill-opacity="0.55"/>
    <circle cx="770" cy="45" r="1.2" fill="#b89cff" fill-opacity="0.55"/>
    <circle cx="450" cy="250" r="1" fill="#8a61ff" fill-opacity="0.4"/>

    <!-- Roles — manually centered for 3 equal segments across 900px -->
    <!-- Segment centers: 150, 450, 750 -->

    <!-- Role 1: Full Stack Developer (~160px wide) centered at 150 -->
    <circle cx="68" cy="213" r="3" fill="#b89cff" fill-opacity="0.9"/>
    <text x="80" y="219" font-family="Arial, Helvetica, sans-serif"
      font-size="11" fill="rgba(238,234,248,0.72)" letter-spacing="2.5">Full Stack Developer</text>

    <!-- Separator 1 at 300 -->
    <circle cx="300" cy="213" r="2.5" fill="#8a61ff" fill-opacity="0.7"/>

    <!-- Role 2: Hackathon Enthusiast (~168px wide) centered at 450 -->
    <circle cx="316" cy="213" r="3" fill="#b89cff" fill-opacity="0.9"/>
    <text x="328" y="219" font-family="Arial, Helvetica, sans-serif"
      font-size="11" fill="rgba(238,234,248,0.72)" letter-spacing="2.5">Hackathon Enthusiast</text>

    <!-- Separator 2 at 600 -->
    <circle cx="600" cy="213" r="2.5" fill="#8a61ff" fill-opacity="0.7"/>

    <!-- Role 3: Learning ML & GenAI centered at 750 -->
    <circle cx="616" cy="213" r="3" fill="#b89cff" fill-opacity="0.9"/>
    <text x="628" y="219" font-family="Arial, Helvetica, sans-serif"
      font-size="11" fill="rgba(238,234,248,0.72)" letter-spacing="2.5">Learning ML &amp; GenAI</text>

  </g>
</svg>
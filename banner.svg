<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#07060f"/>
      <stop offset="100%" style="stop-color:#0d0b1a"/>
    </linearGradient>
    <radialGradient id="blob1" cx="80%" cy="20%" r="55%">
      <stop offset="0%" style="stop-color:#5b35cc;stop-opacity:0.55"/>
      <stop offset="55%" style="stop-color:#2d1a66;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="15%" cy="80%" r="35%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="55%" cy="90%" r="30%">
      <stop offset="0%" style="stop-color:#c084fc;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#07060f;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="45%" style="stop-color:#d4c8ff"/>
      <stop offset="100%" style="stop-color:#8a61ff"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:transparent"/>
      <stop offset="30%" style="stop-color:#8a61ff"/>
      <stop offset="70%" style="stop-color:#c084fc"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(138,97,255,0.06)" stroke-width="0.5"/>
    </pattern>
    <clipPath id="bannerClip">
      <rect width="900" height="280" rx="12"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bannerClip)">
    <!-- Base + blobs + grid -->
    <rect width="900" height="280" fill="url(#bgGrad)"/>
    <rect width="900" height="280" fill="url(#blob1)"/>
    <rect width="900" height="280" fill="url(#blob2)"/>
    <rect width="900" height="280" fill="url(#blob3)"/>
    <rect width="900" height="280" fill="url(#grid)" opacity="0.6"/>

    <!-- Corner brackets with pulse animation -->
    <polyline points="20,40 20,20 40,20" fill="none" stroke="#8a61ff" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="860,20 880,20 880,40" fill="none" stroke="#8a61ff" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="0.75s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="20,240 20,260 40,260" fill="none" stroke="#8a61ff" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="860,260 880,260 880,240" fill="none" stroke="#8a61ff" stroke-width="1.5" opacity="0.6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="2.25s" repeatCount="indefinite"/>
    </polyline>

    <!-- Ghost name (shadow) -->
    <text x="454" y="166" text-anchor="middle"
      font-family="'Arial Black', 'Impact', sans-serif"
      font-size="116" font-weight="900" letter-spacing="20"
      fill="none" stroke="rgba(138,97,255,0.08)" stroke-width="1.5">NISARG</text>

    <!-- Main name -->
    <text x="450" y="160" text-anchor="middle"
      font-family="'Arial Black', 'Impact', sans-serif"
      font-size="116" font-weight="900" letter-spacing="20"
      fill="url(#nameGrad)" filter="url(#glow)">
      NISARG
      <animate attributeName="opacity" values="1;0.88;1;0.93;1" dur="6s" repeatCount="indefinite"/>
    </text>

    <!-- Deco line -->
    <line x1="220" y1="180" x2="680" y2="180" stroke="url(#lineGrad)" stroke-width="1">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="x1" values="260;220;260" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="640;680;640" dur="3.5s" repeatCount="indefinite"/>
    </line>

    <!-- Role: Developer -->
    <circle cx="238" cy="213" r="3" fill="#b89cff">
      <animate attributeName="r" values="3;4.5;3" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <text x="250" y="218" font-family="Arial, sans-serif" font-size="12"
      fill="rgba(238,234,248,0.72)" letter-spacing="3.5">Developer</text>

    <!-- Separator dot 1 -->
    <circle cx="358" cy="213" r="2.5" fill="#8a61ff" opacity="0.7"/>

    <!-- Role: Hackathon Enthusiast -->
    <text x="372" y="218" font-family="Arial, sans-serif" font-size="12"
      fill="rgba(238,234,248,0.72)" letter-spacing="3.5">Hackathon Enthusiast</text>

    <!-- Separator dot 2 -->
    <circle cx="598" cy="213" r="2.5" fill="#8a61ff" opacity="0.7"/>

    <!-- Role: Video Editor -->
    <text x="612" y="218" font-family="Arial, sans-serif" font-size="12"
      fill="rgba(238,234,248,0.72)" letter-spacing="3.5">Video Editor</text>

    <!-- Ambient floating dots -->
    <circle cx="60" cy="55" r="1.5" fill="#8a61ff">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="840" cy="195" r="1.5" fill="#c084fc">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="4s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="130" cy="235" r="1" fill="#6366f1">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="770" cy="45" r="1" fill="#b89cff">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="248" r="1" fill="#8a61ff">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="5s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
